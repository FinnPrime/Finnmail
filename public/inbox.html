<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finnmail</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h2>📧 Finnmail</h2>
      <button class="btn-primary" id="newMessageBtn">+ Новое сообщение</button>
      <hr style="margin:20px 0; border-color:#374151;">
      <div id="conversationList"></div>
      <div style="margin-top:40px;">
        <button id="logout" class="btn-secondary">Выйти</button>
      </div>
    </div>

    <div class="content">
      <div class="header">
        <h3 id="chatTitle">Переписка</h3>
        <div id="user" class="user-badge"></div>
      </div>

      <div class="mail-body">
        <div id="newMessageBox" class="compose-box" style="display:none;">
          <input id="to" placeholder="Кому" />
          <br><br>
          <input id="subject" placeholder="Тема" />
          <br><br>
          <textarea id="text" placeholder="Сообщение"></textarea>
          <br><br>
          <button id="send" class="btn-primary">Отправить</button>
        </div>

        <div id="chatMessages" class="messages-list"></div>
      </div>
    </div>
  </div>

  <script>
    let csrfToken = "";
    let currentChatUser = null;

    async function loadCsrfToken() {
      const res = await fetch("/csrf-token");
      const data = await res.json();
      csrfToken = data.csrfToken;
    }

    async function checkAuth() {
      const res = await fetch("/me");
      if (!res.ok) {
        window.location.href = "/login.html";
        return;
      }

      const data = await res.json();
      document.getElementById("user").innerText = data.user.username;
    }

    async function loadConversations() {
      const res = await fetch("/conversations");
      const conversations = await res.json();

      const list = document.getElementById("conversationList");
      list.innerHTML = "";

      if (!conversations.length) {
        list.innerHTML = "<p>Нет переписок</p>";
        return;
      }

      conversations.forEach(conv => {
        const div = document.createElement("div");
        div.className = "mail-item";
        div.style.marginBottom = "10px";
        div.innerText = conv.username;
        div.onclick = () => openConversation(conv.username);
        list.appendChild(div);
      });
    }

    async function openConversation(username) {
      currentChatUser = username;
      document.getElementById("chatTitle").innerText = "Чат с " + username;

      const res = await fetch("/conversation/" + username);
      const messages = await res.json();

      const box = document.getElementById("chatMessages");
      box.innerHTML = "";

      if (!messages.length) {
        box.innerHTML = '<div class="empty">Нет сообщений</div>';
        return;
      }

      messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message-item";
        div.innerHTML = `
          <div class="message-from">${msg.from_user}</div>
          <div><b>${msg.subject || "(без темы)"}</b></div>
          <div class="message-text">${msg.text}</div>
        `;
        box.appendChild(div);
      });
    }

    document.getElementById("newMessageBtn").onclick = () => {
      const box = document.getElementById("newMessageBox");
      box.style.display = box.style.display === "none" ? "block" : "none";
    };

    document.getElementById("send").onclick = async () => {
      const to = document.getElementById("to").value;
      const subject = document.getElementById("subject").value;
      const text = document.getElementById("text").value;

      const res = await fetch("/send-local", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "CSRF-Token": csrfToken
        },
        body: JSON.stringify({ to, subject, text })
      });

      const answer = await res.text();
      alert(answer);

      if (res.ok) {
        document.getElementById("to").value = "";
        document.getElementById("subject").value = "";
        document.getElementById("text").value = "";

        await loadConversations();

        if (currentChatUser === to) {
          await openConversation(to);
        }
      } else if (res.status === 403) {
        await loadCsrfToken();
      }
    };

    document.getElementById("logout").onclick = async () => {
      await fetch("/logout", {
        method: "POST",
        headers: {
          "CSRF-Token": csrfToken
        }
      });

      window.location.href = "/login.html";
    };

    async function init() {
      await loadCsrfToken();
      await checkAuth();
      await loadConversations();
    }

    init();
  </script>
</body>
</html>
